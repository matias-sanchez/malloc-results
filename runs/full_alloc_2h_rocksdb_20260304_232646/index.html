    .sidebar {

    body.sidebar-collapsed .sidebar-toggle {

    @media (max-width: 1050px) {
      .page {
        height: auto;

        min-height: unset;
        overflow: visible;
      }

      .sidebar {
        max-height: min(52dvh, 720px);
      }

      .viewer {
        min-height: 70vh;
      }

      body.sidebar-collapsed .shell {
        grid-template-columns: 1fr;
      }

      body.sidebar-collapsed .sidebar {
        max-height: 84px;
      }

      body.sidebar-collapsed .sidebar-copy {
        display: block;
      }

      body.sidebar-collapsed .toolbar,
      body.sidebar-collapsed .list {
        display: none;
      }

      body.sidebar-collapsed .sidebar-head {
        justify-content: space-between;
      }
    }
  </style>

    const assetList = document.getElementById("assetList");
    const viewerFrame = document.getElementById("viewerFrame");
    const viewerTitle = document.getElementById("viewerTitle");
    const openLink = document.getElementById("openLink");
    const emptyState = document.getElementById("emptyState");
    const pills = [...document.querySelectorAll(".pill")];
    const sidebarToggle = document.getElementById("sidebarToggle");
    const collapseStorageKey = "malloc-tests-plots-nav-sidebar";

    let activeFilter = "all";
    let activeKey = null;

    function grouped(filtered) {
      const bucket = new Map();
      for (const item of filtered) {
        if (!bucket.has(item.group)) {
          bucket.set(item.group, []);
        }
        bucket.get(item.group).push(item);
      }
      return [...bucket.entries()];
    }

    function pickDefault(filtered) {
      if (!filtered.length) {
        return null;
      }
      if (!activeKey) {
        return filtered[0].key;
      }
      return filtered.some((item) => item.key === activeKey) ? activeKey : filtered[0].key;
    }

    function applySelection(item) {
      if (!item) {
        viewerFrame.setAttribute("src", "about:blank");
        viewerTitle.textContent = "No chart available";
        openLink.setAttribute("href", "#");
        openLink.style.visibility = "hidden";
        emptyState.hidden = false;
        return;
      }
      activeKey = item.key;
      viewerFrame.setAttribute("src", item.href);
      viewerTitle.textContent = `${item.title} - ${item.group}`;
      openLink.setAttribute("href", item.href);
      openLink.style.visibility = "visible";
      emptyState.hidden = true;
    }

    function setSidebarCollapsed(collapsed) {
      document.body.classList.toggle("sidebar-collapsed", collapsed);
      sidebarToggle.setAttribute("aria-expanded", String(!collapsed));
      sidebarToggle.setAttribute("aria-label", collapsed ? "Expand sidebar" : "Collapse sidebar");
      sidebarToggle.setAttribute("title", collapsed ? "Expand sidebar" : "Collapse sidebar");
      sidebarToggle.innerHTML = collapsed ? "&#8250;" : "&#8249;";
      try {
        window.localStorage.setItem(collapseStorageKey, collapsed ? "collapsed" : "expanded");
      } catch (error) {
        console.warn("Unable to persist sidebar state", error);
      }
    }

    function render() {
      const filtered = assets.filter((item) => activeFilter === "all" || item.category === activeFilter);
      const selectedKey = pickDefault(filtered);
      assetList.innerHTML = "";

      if (!filtered.length) {
        applySelection(null);
        return;
      }

      for (const [groupName, items] of grouped(filtered)) {
        const group = document.createElement("section");
        group.className = "group";

        const heading = document.createElement("h3");
        heading.className = "group-head";
        heading.textContent = groupName;
        group.appendChild(heading);

        for (const item of items) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "asset";
          if (item.key === selectedKey) {
            button.classList.add("active");
          }
          button.addEventListener("click", () => {
            activeKey = item.key;
            render();
          });

          const title = document.createElement("p");
          title.className = "asset-title";
          title.textContent = item.title;

          const badge = document.createElement("span");
          badge.className = `badge ${item.category}`;
          badge.textContent = item.category;

          button.appendChild(title);
          button.appendChild(badge);
          group.appendChild(button);
        }

        assetList.appendChild(group);
      }

      const selected = filtered.find((item) => item.key === selectedKey) || filtered[0];
      applySelection(selected);
    }

    for (const pill of pills) {
      pill.addEventListener("click", () => {
        activeFilter = pill.dataset.filter || "all";
        for (const candidate of pills) {
          candidate.classList.toggle("active", candidate === pill);
        }
        render();
      });
    }

    sidebarToggle.addEventListener("click", () => {
      setSidebarCollapsed(!document.body.classList.contains("sidebar-collapsed"));
    });

    try {
      setSidebarCollapsed(window.localStorage.getItem(collapseStorageKey) === "collapsed");
    } catch (error) {
      setSidebarCollapsed(false);
    }

    render();
  </script>
