<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Settings Explorer</title>
  <style>
    :root {
      --bg: #f6f7f4;
      --panel: #ffffff;
      --ink: #111827;
      --muted: #4b5563;
      --line: #d1d5db;
      --accent: #0f766e;
      --accent-2: #1d4ed8;
      --warning: #92400e;
      --warning-bg: #fffbeb;
      --danger: #b91c1c;
      --danger-bg: #fef2f2;
      --success: #166534;
      --success-bg: #f0fdf4;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #f8fafc 0%, #f3f4f6 100%);
    }
    .page {
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
    }
    .top {
      padding: 18px 22px 10px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(120deg, rgba(15,118,110,.08), rgba(29,78,216,.06));
    }
    .kicker {
      margin: 0;
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
    }
    h1 {
      margin: 6px 0 0;
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.05;
      font-weight: 800;
    }
    .meta {
      margin-top: 8px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
    }
    .chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 10px;
      background: rgba(255,255,255,.9);
    }
    .toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      padding: 12px 20px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.92);
    }
    .tabs, .node-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tab-btn, .node-btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: white;
      color: var(--muted);
      font-size: 13px;
      padding: 8px 12px;
      cursor: pointer;
    }
    .tab-btn.active, .node-btn.active {
      color: white;
      border-color: transparent;
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
    }
    .search {
      margin-left: auto;
      min-width: min(420px, 100%);
      flex: 1 1 280px;
    }
    .search input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 10px 14px;
      font: inherit;
    }
    .content {
      padding: 14px 18px 20px;
      min-height: 0;
      overflow: auto;
    }
    .banner {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 12px;
      font-size: 14px;
    }
    .banner.warning {
      color: var(--warning);
      background: var(--warning-bg);
      border-color: #fcd34d;
    }
    .banner.error {
      color: var(--danger);
      background: var(--danger-bg);
      border-color: #fca5a5;
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }
    .summary-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      padding: 12px 14px;
      box-shadow: 0 8px 18px rgba(15,23,42,.05);
    }
    .summary-card h3 {
      margin: 0 0 8px;
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .summary-card p {
      margin: 0;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .line-list {
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      background: white;
    }
    .line-row {
      display: grid;
      grid-template-columns: 64px minmax(0, 1fr);
      gap: 10px;
      padding: 8px 12px;
      border-top: 1px solid var(--line);
      font-family: "IBM Plex Mono", "SFMono-Regular", monospace;
      font-size: 12px;
    }
    .line-row:first-child {
      border-top: 0;
    }
    .line-no {
      color: var(--muted);
      user-select: none;
    }
    .line-text {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .json-tree {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: white;
      padding: 12px;
      box-shadow: 0 8px 18px rgba(15,23,42,.05);
    }
    .json-stack, .json-children {
      display: grid;
      gap: 8px;
    }
    .json-node {
      margin-left: calc(var(--json-depth, 0) * 18px);
    }
    .json-details {
      margin: 0;
    }
    .json-summary, .json-leaf {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #f8fafc;
      font-family: "IBM Plex Mono", "SFMono-Regular", monospace;
      font-size: 12px;
      line-height: 1.5;
    }
    .json-summary {
      cursor: pointer;
      list-style: none;
    }
    .json-summary::-webkit-details-marker {
      display: none;
    }
    .json-children {
      margin-top: 8px;
    }
    .json-toggle {
      flex: none;
      width: 12px;
      margin-top: 2px;
      color: var(--muted);
      transform: rotate(-90deg);
      transition: transform .12s ease;
    }
    .json-details[open] > .json-summary .json-toggle {
      transform: rotate(0deg);
    }
    .json-key {
      color: var(--accent);
      font-weight: 700;
      word-break: break-word;
    }
    .json-colon {
      color: var(--muted);
    }
    .json-preview {
      color: var(--muted);
      font-size: 11px;
      letter-spacing: .02em;
    }
    .json-token-string {
      color: #1d4ed8;
    }
    .json-token-number {
      color: #0f766e;
    }
    .json-token-boolean {
      color: #7c3aed;
    }
    .json-token-null {
      color: var(--muted);
      font-style: italic;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
    }
    th, td {
      padding: 10px 12px;
      border-top: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 13px;
    }
    th {
      background: #f8fafc;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    tr:first-child th, tr:first-child td {
      border-top: 0;
    }
    .mono {
      font-family: "IBM Plex Mono", "SFMono-Regular", monospace;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .empty {
      border: 1px dashed var(--line);
      border-radius: 14px;
      padding: 20px;
      text-align: center;
      color: var(--muted);
      background: rgba(255,255,255,.8);
    }
    .status-pill {
      display: inline-block;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .status-pill.success { background: var(--success-bg); color: var(--success); }
    .status-pill.partial { background: var(--warning-bg); color: var(--warning); }
    .status-pill.failed, .status-pill.missing { background: var(--danger-bg); color: var(--danger); }
  </style>

        const button = document.createElement("button");
        button.type = "button";
        button.className = "node-btn" + (node === activeNode ? " active" : "");
        button.textContent = node;
        button.addEventListener("click", () => {
          activeNodes[activeTab] = node;
          renderNodeTabs();
          renderContent();
        });
        nodeTabs.appendChild(button);
      }
    }

    function sectionBanner(status, error, warning) {
      if (status === "success" && !warning) {
        return "";
      }
      const klass = status === "failed" || status === "missing" ? "error" : "warning";
      const parts = [];
      if (status && status !== "success") {
        parts.push(`Section status: ${escapeHtml(status)}`);
      }
      if (error) {
        parts.push(`Error: ${escapeHtml(error)}`);
      }
      if (warning) {
        parts.push(`Warning: ${escapeHtml(warning)}`);
      }
      return `<div class="banner ${klass}">${parts.join("<br />")}</div>`;
    }

    function renderLineList(lines) {
      if (!lines.length) {
        return '<div class="empty">No content available for this section.</div>';
      }
      const filtered = lines
        .map((line, index) => [line, index + 1])
        .filter(([line]) => !searchTerm || line.toLowerCase().includes(searchTerm));
      if (!filtered.length) {
        return '<div class="empty">No lines matched the current search.</div>';
      }
      const rows = filtered.map(([line, index]) => `
        <div class="line-row">
          <span class="line-no">${index}</span>
          <pre class="line-text">${escapeHtml(line)}</pre>
        </div>
      `).join("");
      return `<div class="line-list">${rows}</div>`;
    }

    function isJsonComposite(value) {
      return value !== null && typeof value === "object";
    }

    function jsonEntries(value) {
      if (Array.isArray(value)) {
        return value.map((item, index) => [String(index), item]);
      }
      return Object.entries(value || {});
    }

    function jsonLabel(label, inArray) {
      return inArray ? `[${escapeHtml(String(label))}]` : escapeHtml(String(label));
    }

    function jsonScalar(value) {
      if (value === null) {
        return '<span class="json-token-null">null</span>';
      }
      if (typeof value === "string") {
        return `<span class="json-token-string">"${escapeHtml(value)}"</span>`;
      }
      if (typeof value === "number") {
        return `<span class="json-token-number">${escapeHtml(String(value))}</span>`;
      }
      if (typeof value === "boolean") {
        return `<span class="json-token-boolean">${value ? "true" : "false"}</span>`;
      }
      return `<span>${escapeHtml(String(value))}</span>`;
    }

    function jsonPreview(value) {
      if (Array.isArray(value)) {
        const count = value.length;
        return count === 1 ? "[1 item]" : `[${count} items]`;
      }
      const count = Object.keys(value || {}).length;
      return count === 1 ? "{1 key}" : `{${count} keys}`;
    }

    function jsonMatches(label, value) {
      if (!searchTerm) {
        return true;
      }
      if (String(label).toLowerCase().includes(searchTerm)) {
        return true;
      }
      if (!isJsonComposite(value)) {
        return String(value).toLowerCase().includes(searchTerm);
      }
      return jsonEntries(value).some(
        ([childLabel, childValue]) => jsonMatches(childLabel, childValue)
      );
    }

    function renderJsonNode(label, value, depth, inArray) {
      const formattedLabel = jsonLabel(label, inArray);
      const nodeDepth = `--json-depth:${depth}`;
      if (!isJsonComposite(value)) {
        return `
          <div class="json-node" style="${nodeDepth}">
            <div class="json-leaf">
              <span class="json-key">${formattedLabel}</span>
              <span class="json-colon">:</span>
              ${jsonScalar(value)}
            </div>
          </div>
        `;
      }
      const entries = jsonEntries(value);
      const children = entries
        .filter(([childLabel, childValue]) => jsonMatches(childLabel, childValue))
        .map(
          ([childLabel, childValue]) =>
            renderJsonNode(childLabel, childValue, depth + 1, Array.isArray(value))
        )
        .join("");
      const isOpen = searchTerm ? true : depth === 0;
      const emptyState = '<div class="json-leaf"><span class="json-preview">empty</span></div>';
      return `
        <div class="json-node" style="${nodeDepth}">
          <details class="json-details" ${isOpen ? "open" : ""}>
            <summary class="json-summary">
              <span class="json-toggle">▸</span>
              <span class="json-key">${formattedLabel}</span>
              <span class="json-colon">:</span>
              <span class="json-preview">${jsonPreview(value)}</span>
            </summary>
            <div class="json-children">
              ${children || emptyState}
            </div>
          </details>
        </div>
      `;
    }

    function renderJsonTree(data) {
      if (!data || typeof data !== "object") {
        return '<div class="empty">No JSON content available for this section.</div>';
      }
      const nodes = jsonEntries(data)
        .filter(([label, value]) => jsonMatches(label, value))
        .map(([label, value]) => renderJsonNode(label, value, 0, Array.isArray(data)))
        .join("");
      if (!nodes) {
        return '<div class="empty">No JSON entries matched the current search.</div>';
      }
      return `<div class="json-tree"><div class="json-stack">${nodes}</div></div>`;
    }

    function renderVariablesTable(rows) {
      const filtered = rows.filter((row) => {
        const haystack = `${row.key} ${row.value}`.toLowerCase();
        return !searchTerm || haystack.includes(searchTerm);
      });
      if (!filtered.length) {
        return '<div class="empty">No variables matched the current search.</div>';
      }
      const body = filtered.map((row) => `
        <tr>
          <td class="mono">${escapeHtml(row.key)}</td>
          <td class="mono">${escapeHtml(row.value)}</td>
        </tr>
      `).join("");
      return `
        <table>
          <tr><th>Variable</th><th>Value</th></tr>
          ${body}
        </table>
      `;
    }

    function renderAllocatorRuntime(rows) {
      const filtered = rows.filter((row) => {
        const envText = Object.entries(row.expected_allocator_env || {})
          .map(([key, value]) => `${key}=${value}`)
          .join(" ");
        const haystack = `${row.allocator} ${row.status} ${row.message} ${row.expected_lib} ${row.expected_malloc_conf} ${envText} ${row.artifact_rel}`.toLowerCase();
        return !searchTerm || haystack.includes(searchTerm);
      });
      if (!filtered.length) {
        return '<div class="empty">No allocator rows matched the current search.</div>';
      }
      const body = filtered.map((row) => {
        const envText = Object.entries(row.expected_allocator_env || {})
          .map(([key, value]) => `${key}=${value}`)
          .join("\n");
        return `
          <tr>
            <td class="mono">${escapeHtml(row.allocator)}</td>
            <td><span class="status-pill ${escapeHtml(row.status)}">${escapeHtml(row.status)}</span></td>
            <td class="mono">${escapeHtml(row.expected_lib || "")}</td>
            <td class="mono">${escapeHtml(row.expected_malloc_conf || "")}</td>
            <td class="mono">${escapeHtml(envText || "")}</td>
            <td>${escapeHtml(String(row.pid_count || 0))}</td>
            <td class="mono">${escapeHtml((row.diagnostic_env_verified_pids || []).join(", "))}</td>
            <td>${escapeHtml(row.message || "")}</td>
          </tr>
        `;
      }).join("");
      return `
        <table>
          <tr>
            <th>Allocator</th>
            <th>Status</th>
            <th>Expected lib</th>
            <th>MALLOC_CONF</th>
            <th>Expected env</th>
            <th>PIDs</th>
            <th>Env-verified PIDs</th>
            <th>Message</th>
          </tr>
          ${body}
        </table>
      `;
    }

    function renderOsSummary(summary) {
      const cards = [
        ["Hostname", summary.hostname || "unknown"],
        ["Kernel", summary.kernel?.uname || "unknown"],
        ["THP enabled", summary.transparent_hugepage?.enabled || "unknown"],
        ["THP defrag", summary.transparent_hugepage?.defrag || "unknown"],
        ["max_ptes_none", summary.transparent_hugepage?.max_ptes_none || "unknown"],
        ["vm.overcommit_memory", summary.vm?.overcommit_memory || "unknown"],
      ];
      if (summary.meminfo) {
        for (const [key, value] of Object.entries(summary.meminfo)) {
          cards.push([key, value]);
        }
      }
      return `
        <div class="summary-grid">
          ${cards.map(([label, value]) => `
            <div class="summary-card">
              <h3>${escapeHtml(label)}</h3>
              <p>${escapeHtml(String(value))}</p>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderContent() {
      const tabsPayload = payload.tabs || {};
      bannerHost.innerHTML = "";
      contentHost.innerHTML = "";
      if (activeTab === "run_config") {
        const tab = tabsPayload.run_config || {};
        bannerHost.innerHTML = sectionBanner(tab.status, tab.error, tab.warning);
        contentHost.innerHTML = tab.json
          ? renderJsonTree(tab.json)
          : renderLineList(tab.lines || []);
        return;
      }
      if (activeTab === "os_vm") {
        const tab = tabsPayload.os_vm || {};
        const sysctl = tab.sysctl || {};
        bannerHost.innerHTML = sectionBanner(tab.status, tab.error, tab.warning) + sectionBanner(sysctl.status, sysctl.error, sysctl.warning);
        contentHost.innerHTML = renderOsSummary(tab.summary || {}) + renderLineList(sysctl.lines || []);
        return;
      }
      if (activeTab === "mysql_config_files") {
        const node = activeNodes.mysql_config_files || "master";
        const tab = tabsPayload.mysql_config_files || {};
        const nodePayload = (tab.nodes || {})[node] || {};
        bannerHost.innerHTML = sectionBanner(nodePayload.status, nodePayload.error, nodePayload.warning);
        contentHost.innerHTML = renderLineList(nodePayload.lines || []);
        return;
      }
      if (activeTab === "mysql_effective_variables") {
        const node = activeNodes.mysql_effective_variables || "master";
        const tab = tabsPayload.mysql_effective_variables || {};
        const nodePayload = (tab.nodes || {})[node] || {};
        bannerHost.innerHTML = sectionBanner(nodePayload.status, nodePayload.error, nodePayload.warning);
        contentHost.innerHTML = renderVariablesTable(nodePayload.rows || []);
        return;
      }
      if (activeTab === "allocator_runtime") {
        const tab = tabsPayload.allocator_runtime || {};
        contentHost.innerHTML = renderAllocatorRuntime(tab.allocators || []);
      }
    }

    function render() {
      renderTabs();
      renderNodeTabs();
      renderContent();
    }

    searchInput.addEventListener("input", () => {
      searchTerm = searchInput.value.trim().toLowerCase();
      renderContent();
    });

    render();
  </script>
</body>
</html>
